AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: POS Backend - API Gateway HTTP API + Lambda Java 17 + DynamoDB

Globals:
  Function:
    Runtime: java17
    Timeout: 15
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        PRODUCTOS_TABLE: !Ref ProductosTable
        VENTAS_TABLE: !Ref VentasTable

Resources:

  PosHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - OPTIONS

  GetProductosFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.pos.api.lambda.GetProductosHandler::handleRequest
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProductosTable
      Events:
        GetProductos:
          Type: HttpApi
          Properties:
            ApiId: !Ref PosHttpApi
            Path: /productos
            Method: GET

  PostVentasFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.pos.api.lambda.PostVentasHandler::handleRequest
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProductosTable
        - DynamoDBCrudPolicy:
            TableName: !Ref VentasTable
      Events:
        PostVentas:
          Type: HttpApi
          Properties:
            ApiId: !Ref PosHttpApi
            Path: /ventas
            Method: POST

  ProductosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  VentasTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

Outputs:
  ApiUrl:
    Description: URL de la API
    Value: !Sub "https://${PosHttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  ProductosTableName:
    Description: Nombre de la tabla de productos
    Value: !Ref ProductosTable
  VentasTableName:
    Description: Nombre de la tabla de ventas
    Value: !Ref VentasTable
